<div class="flex-column gap-6">
    <!-- Profile Form -->
    <div class="card">
        <div class="section-header">
            <div>
                <h3 class="cell-bold">Profile Information</h3>
                <p class="section-header__subtitle">Update your account's profile information and email address.</p>
            </div>
        </div>

        <form hx-post="/admin/profile?csrf_token={{ csrf_token }}" hx-target="#main-content" hx-swap="innerHTML"
            class="flex-column gap-6">

            <div class="modern-form-grid">
                <div class="form-field">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" name="username" id="username" value="{{ user.username }}" readonly
                        class="form-input form-input--readonly">
                    <p class="auth-hint">Username cannot be changed.</p>
                </div>

                <div class="form-field">
                    <label for="name" class="form-label">Display Name</label>
                    <input type="text" name="name" id="name" value="{{ user.name }}" class="form-input">
                </div>

                <div class="form-field">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" name="email" id="email" value="{{ user.email }}" class="form-input">
                </div>
            </div>

            <div class="flex-end">
                <button type="submit" class="btn btn--primary">Save</button>
            </div>
        </form>
    </div>

    <!-- Password Change Form -->
    <div class="card" id="password-section">
        <div class="section-header">
            <div>
                <h3 class="cell-bold">Security</h3>
                <p class="section-header__subtitle">Update your password to keep your account secure.</p>
            </div>
        </div>

        <form hx-post="/admin/profile/password?csrf_token={{ csrf_token }}" hx-target="#main-content"
            hx-swap="innerHTML" class="flex-column gap-6">

            <div class="modern-form-grid">
                <div class="form-field">
                    <label for="current_password" class="form-label">Current Password</label>
                    <input type="password" name="current_password" id="current_password" required class="form-input">
                </div>

                <div class="form-field">
                    <label for="new_password" class="form-label">New Password</label>
                    <input type="password" name="new_password" id="new_password" required minlength="8"
                        class="form-input">
                    <p class="auth-hint">Must be at least 8 characters.</p>
                </div>

                <div class="form-field">
                    <label for="confirm_password" class="form-label">Confirm New Password</label>
                    <input type="password" name="confirm_password" id="confirm_password" required minlength="8"
                        class="form-input">
                </div>
            </div>

            <div class="flex-end">
                <button type="submit" class="btn btn--primary">Change Password</button>
            </div>
        </form>
    </div>
    <!-- Active Sessions -->
    <div id="active-sessions-section" hx-get="/admin/profile/sessions" hx-trigger="load">
        <div class="card flex justify-center p-8">
            <span class="text-secondary">Carregando sessões ativas...</span>
        </div>
    </div>
</div>
