{% extends "base.html" %}
{% import "shared/icons.html" as icons %}

{% block title %}403 - Acesso Negado{% endblock %}

{% block content %}
<div class="flex-center h-full">
    <div class="card error-card">
        <div class="flex-center mb-6">
            <i data-lucide="shield-x" class="text-danger icon-4xl"></i>
        </div>
        <h1 class="error-code">403</h1>
        <h2 class="text-secondary mb-6">Acesso Negado</h2>
        <p class="text-secondary mb-4">
            Você não tem permissão para acessar este recurso.
        </p>
        <p class="text-secondary text-sm mb-6">
            {{ message }}
        </p>
        <div class="mt-6">
            <a href="/admin" class="btn btn--primary no-underline">
                <i data-lucide="arrow-left" class="icon-sm"></i>
                Voltar ao Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
