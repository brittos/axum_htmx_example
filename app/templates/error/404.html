{% extends "base.html" %}
{% import "shared/icons.html" as icons %}

{% block title %}404 - Not Found{% endblock %}

{% block content %}
<div class="flex-center h-full">
    <div class="card error-card">
        <div class="flex-center mb-6">
            <i data-lucide="alert-triangle" class="text-warning icon-4xl"></i>
        </div>
        <h1 class="error-code">404</h1>
        <h2 class="text-secondary mb-6">Page Not Found</h2>
        <p class="text-secondary mb-4">
            The requested resource <code class="error-path">{{ uri }}</code> does not exist.
        </p>
        <div class="mt-6">
            <a href="{{ home_link }}" class="btn btn--primary no-underline">
                <i data-lucide="arrow-left" class="icon-sm"></i>
                Go Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
