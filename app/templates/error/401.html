{% extends "base.html" %}
{% import "shared/icons.html" as icons %}

{% block title %}401 - Não Autorizado{% endblock %}

{% block content %}
<div class="flex-center h-full">
    <div class="card error-card">
        <div class="flex-center mb-6">
            <i data-lucide="lock" class="text-info icon-4xl"></i>
        </div>
        <h1 class="error-code">401</h1>
        <h2 class="text-secondary mb-6">Autenticação Necessária</h2>
        <p class="text-secondary mb-4">
            Sua sessão expirou ou você precisa fazer login para acessar este recurso.
        </p>
        <div class="mt-6">
            <a href="/admin/login" class="btn btn--primary no-underline">
                <i data-lucide="log-in" class="icon-sm"></i>
                Fazer Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
