<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Bero Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    {% import "shared/icons.html" as icons %}
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <h2 class="auth-title">Set a new password</h2>
        </div>

        <div class="auth-card">
            {% if let Some(msg) = error_message %}
            <div class="auth-alert auth-alert--error">
                <div class="auth-alert__icon">
                    {% call icons::x_circle("") %}{% endcall %}
                </div>
                <span class="auth-alert__message">{{ msg }}</span>
            </div>
            {% endif %}

            <form class="auth-form" action="/auth/reset-password?csrf_token={{ csrf_token }}" method="POST">
                <input type="hidden" name="token" value="{{ token }}">

                <div class="form-field">
                    <label for="password" class="form-label">New Password</label>
                    <input id="password" name="password" type="password" required minlength="8" class="auth-input"
                        placeholder="••••••••">
                    <p class="auth-hint">At least 8 characters</p>
                </div>

                <div class="form-field">
                    <label for="confirm_password" class="form-label">Confirm New Password</label>
                    <input id="confirm_password" name="confirm_password" type="password" required minlength="8"
                        class="auth-input" placeholder="••••••••">
                </div>

                <button type="submit" class="auth-btn">
                    Reset Password
                </button>
            </form>
        </div>
    </div>
</body>

</html>
